name: Refresh Competitor Pricing

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  refresh-competitors:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Run competitor refresh script
        run: node scripts/refresh-competitors.js
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

      - name: Commit and push updated competitors.json
        run: |
          if git status --porcelain data/competitors.json | grep -q "M "; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/competitors.json
            git commit -m "chore: refresh competitor data [skip ci]"
            git push
          else
            echo "No changes to competitors.json"
          fi

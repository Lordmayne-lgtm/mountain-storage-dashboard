name: Refresh Competitor Data

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  refresh-competitors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run competitor refresh script
        run: node scripts/refresh-competitors.js

      - name: Commit and push updated competitors.json
        run: |
          if git diff --quiet data/competitors.json 2>/dev/null; then
            echo "No changes to competitors.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/competitors.json
            git commit -m "chore: refresh competitor data [skip ci]"
            git push
          fi

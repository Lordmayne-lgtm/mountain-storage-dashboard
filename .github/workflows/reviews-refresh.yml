name: Refresh Google & U-Haul Reviews

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  refresh-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run reviews refresh script
        run: node scripts/refresh-reviews.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Commit and push updated reviews.json
        run: |
          if git diff --quiet data/reviews.json 2>/dev/null; then
            echo "No changes to reviews.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/reviews.json
            git commit -m "chore: refresh reviews data [skip ci]"
            git push
          fi

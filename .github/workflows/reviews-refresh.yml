name: Refresh Google & U-Haul Reviews

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  refresh-reviews:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Run reviews refresh script
        run: node scripts/refresh-reviews.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Commit and push updated reviews.json
        run: |
          if git status --porcelain data/reviews.json | grep -q "M "; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/reviews.json
            git commit -m "chore: refresh reviews data [skip ci]"
            git push
          else
            echo "No changes to reviews.json"
          fi
